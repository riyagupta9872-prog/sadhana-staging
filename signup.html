<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — RAPD Sadhana Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sadhana">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --primary:#2c3e50; --secondary:#3498db; --success:#27ae60; --danger:#e74c3c; --light:#f4f7f6; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:var(--light); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:white; padding:32px 28px; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.1); width:100%; max-width:420px; }
        .logo { text-align:center; margin-bottom:20px; }
        .logo .icon { font-size:42px; }
        h2 { margin:6px 0 4px; color:var(--primary); font-size:1.4em; }
        .subtitle { font-size:13px; color:#888; }
        hr { border:none; border-top:1px solid #eee; margin:18px 0; }
        .form-group { margin-top:14px; }
        label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:5px; }
        input { width:100%; padding:12px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; outline:none; transition:border 0.2s; }
        input:focus { border-color:var(--secondary); }
        .pw-wrap { position:relative; }
        .pw-wrap input { padding-right:44px; }
        .pw-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#999; font-size:17px; padding:0; width:auto; }
        .pw-eye:hover { color:var(--secondary); }
        .caps-warning { display:none; align-items:center; gap:6px; background:#fff3cd; border:1px solid #ffc107; border-radius:6px; padding:5px 10px; font-size:12px; color:#856404; font-weight:600; margin-top:5px; }
        .caps-warning.show { display:flex; }
        .strength-bar { height:4px; border-radius:2px; margin-top:6px; background:#eee; }
        .strength-fill { height:100%; width:0; border-radius:2px; transition:all 0.3s; }
        .strength-text { font-size:11px; margin-top:3px; font-weight:600; min-height:16px; }
        .submit-btn { width:100%; margin-top:20px; padding:13px; background:var(--secondary); color:white; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; transition:0.2s; }
        .submit-btn:hover { opacity:0.9; }
        .submit-btn:disabled { background:#95a5a6; cursor:not-allowed; }
        .msg { display:none; margin-top:14px; padding:12px 14px; border-radius:8px; font-size:13px; font-weight:600; text-align:center; }
        .login-link { text-align:center; margin-top:18px; font-size:13px; color:#666; }
        .login-link a { color:var(--secondary); font-weight:600; text-decoration:none; }
        .login-link a:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="icon">📿</div>
        <h2>Create Account</h2>
        <p class="subtitle">RAPD Sadhana Tracker</p>
    </div>
    <hr>
    <form id="signup-form">
        <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="Your devotional name" required autocomplete="name">
        </div>
        <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="signup-password">Password</label>
            <div class="pw-wrap">
                <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6"
                    autocomplete="new-password"
                    onkeyup="checkCapsLock(event,'caps-signup');checkStrength(this.value)"
                    onkeydown="checkCapsLock(event,'caps-signup')">
                <button type="button" class="pw-eye" onclick="togglePw('signup-password',this)">👁️</button>
            </div>
            <div id="caps-signup" class="caps-warning">⇪ Caps Lock is ON</div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-text" id="strength-text"></div>
        </div>
        <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <div class="pw-wrap">
                <input type="password" id="signup-confirm" placeholder="Re-enter password" required autocomplete="new-password">
                <button type="button" class="pw-eye" onclick="togglePw('signup-confirm',this)">👁️</button>
            </div>
        </div>
        <button type="submit" class="submit-btn" id="signup-btn">🙏 Create Account</button>
    </form>
    <div class="msg" id="signup-msg"></div>
    <p class="login-link">Already have an account? <a href="index.html">Login here</a></p>
</div>

<script>
    // ── Firebase ── SAME project as app.js ───────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyDMXB0mD3fZPpCQti9Ikt-MdBjzmfBNfJs",
        authDomain: "nimai-nitai.firebaseapp.com",
        projectId: "nimai-nitai",
        storageBucket: "nimai-nitai.firebasestorage.app",
        messagingSenderId: "221744100000",
        appId: "1:221744100000:web:24830d9a7d9a5cb4d3cfc5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // ── Helpers ──────────────────────────────────────────────────────────
    function togglePw(id, btn) {
        const inp = document.getElementById(id);
        if (!inp) return;
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    function checkCapsLock(e, warningId) {
        const el = document.getElementById(warningId);
        if (!el || !e.getModifierState) return;
        el.classList.toggle('show', e.getModifierState('CapsLock'));
    }
    function checkStrength(pw) {
        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');
        if (!pw) { fill.style.width='0'; text.textContent=''; return; }
        let score = 0;
        if (pw.length >= 6)  score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/\d/.test(pw))   score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        const levels = [
            { w:'20%', bg:'#e74c3c', label:'Very weak',  color:'#e74c3c' },
            { w:'40%', bg:'#e67e22', label:'Weak',       color:'#e67e22' },
            { w:'60%', bg:'#f39c12', label:'Fair',       color:'#f39c12' },
            { w:'80%', bg:'#2ecc71', label:'Good',       color:'#2ecc71' },
            { w:'100%',bg:'#27ae60', label:'Strong 💪',  color:'#27ae60' },
        ];
        const lvl = levels[Math.min(score, 5) - 1] || levels[0];
        fill.style.width = lvl.w;
        fill.style.background = lvl.bg;
        text.textContent = lvl.label;
        text.style.color = lvl.color;
    }
    function showMsg(txt, isSuccess) {
        const el = document.getElementById('signup-msg');
        el.style.display = 'block';
        el.style.background = isSuccess ? '#e8f8f0' : '#ffebee';
        el.style.color      = isSuccess ? '#27ae60' : '#e74c3c';
        el.textContent = txt;
    }

    // ── Signup submit ─────────────────────────────────────────────────────
    document.getElementById('signup-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn     = document.getElementById('signup-btn');
        const name    = document.getElementById('signup-name').value.trim();
        const email   = document.getElementById('signup-email').value.trim();
        const pw      = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;

        if (!name)        { showMsg('Please enter your full name.', false); return; }
        if (pw !== confirm){ showMsg('Passwords do not match. Please re-enter.', false); return; }
        if (pw.length < 6){ showMsg('Password must be at least 6 characters.', false); return; }

        btn.disabled = true;
        btn.textContent = 'Creating account…';

        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pw);
            await db.collection('users').doc(cred.user.uid).set({
                name: name,
                role: 'user',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('signup-form').style.display = 'none';
            showMsg('✅ Account created! Redirecting to login…', true);
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        } catch (err) {
            btn.disabled = false;
            btn.textContent = '🙏 Create Account';
            let msg;
            switch (err.code) {
                case 'auth/email-already-in-use':
                    msg = 'An account with this email already exists. Please login instead.'; break;
                case 'auth/invalid-email':
                    msg = 'Invalid email address. Please check and try again.'; break;
                case 'auth/weak-password':
                    msg = 'Password is too weak. Please choose a stronger password.'; break;
                case 'auth/network-request-failed':
                    msg = 'Network error. Please check your internet connection.'; break;
                default:
                    msg = 'Sign up failed: ' + err.message;
            }
            showMsg(msg, false);
        }
    };
</script>
</body>
</html>
